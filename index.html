<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game Layout</title>
    <!-- Remixicons for icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Background Texts -->
        <div class="bg-text bg-game">GAME</div>
        <div class="bg-text bg-squid">SQUID</div>

        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">
                <img src="images/logo.png" alt="Squid Game Logo">
            </div>
            <ul class="nav-links">
                <li><a href="#">About</a></li>
                <li><a href="#" class="active">Watch now</a></li>
                <li><a href="#">Actors</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="menu-btn">
                <i class="ri-menu-3-line"></i>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="left-side">
                <div class="hero-logo">
                    <img src="images/logo.png" alt="Squid Game Logo">
                    <i class="ri-star-s-fill star-yellow"></i>
                    <i class="ri-star-s-fill star-cyan"></i>
                </div>
                <p class="description">
                    Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                    Season 1: 9 Episodes
                </p>
                <div class="action-buttons">
                    <a href="#" class="btn btn-primary">
                        <span class="icon-circle"><i class="ri-play-fill"></i></span>
                        Play Now
                    </a>
                    <a href="#" class="btn btn-secondary">
                        <i class="ri-play-line"></i> Watch Trailer
                    </a>
                </div>
            </div>

            <!-- Scroll Indicator -->
            <div class="scroll-indicator">
                <span class="scroll-text">SCROLL</span>
                <span class="scroll-line"></span>
            </div>

            <div class="right-side">
                <img src="images/2.png" alt="Squid Game Guard" class="hero-guard">
            </div>
        </main>

        <!-- Social Icons -->
        <div class="social-icons">
            <a href="#"><i class="ri-twitter-fill"></i></a>
            <a href="#"><i class="ri-instagram-line"></i></a>
            <a href="#"><i class="ri-facebook-fill"></i></a>
        </div>

        <!-- Bottom Cards Section -->
        <div class="cards-container">
            <div class="card">
                <img src="images/5.jpg" alt="Card 1">
                <div class="play-overlay"><i class="ri-play-fill"></i></div>
            </div>
            <div class="card">
                <img src="images/4.jpg" alt="Card 2">
                <div class="play-overlay"><i class="ri-play-fill"></i></div>
            </div>
            <div class="card">
                <img src="images/6.png" alt="Card 3">
                <div class="play-overlay"><i class="ri-play-fill"></i></div>
            </div>
        </div>
    </div>
</body>

</html>
